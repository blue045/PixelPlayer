name: Build PixelPlayer IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build KMP Framework for iOS
        run: |
          chmod +x ./gradlew
          # Skip Android tasks to avoid missing SDK errors
          ./gradlew :shared:assembleIosArm64 -x :app:preBuild -x :wear:preBuild -x :baselineprofile:preBuild

      - name: Create project.yml for XcodeGen
        run: |
          cat > project.yml << 'EOF'
          name: PixelPlayer
          options:
            bundleIdPrefix: com.theveloper
            deploymentTarget:
              iOS: "16.0"
          targets:
            PixelPlayer:
              type: application
              platform: iOS
              sources:
                - iosApp/iosApp
              settings:
                FRAMEWORK_SEARCH_PATHS: $(SRCROOT)/shared/build/bin/iosArm64/releaseFramework
                OTHER_LDFLAGS: -framework shared
              info:
                path: iosApp/iosApp/Info.plist
                properties:
                  UILaunchScreen: {}
                  UISupportedInterfaceOrientations:
                    - UIInterfaceOrientationPortrait
          EOF

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Build iOS App (No Signing)
        run: |
          xcodebuild \
            -project PixelPlayer.xcodeproj \
            -scheme PixelPlayer \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/PixelPlayer.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Export IPA (Unsigned)
        run: |
          mkdir -p build/ipa
          if [ -d "build/PixelPlayer.xcarchive/Products/Applications/PixelPlayer.app" ]; then
            cp -r build/PixelPlayer.xcarchive/Products/Applications/PixelPlayer.app build/ipa/
            cd build/ipa
            mkdir Payload
            mv PixelPlayer.app Payload/
            zip -r ../PixelPlayer_unsigned.ipa Payload
            cd ../..
          else
            echo "Build failed: App directory not found"
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PixelPlayer-IPA
          path: build/PixelPlayer_unsigned.ipa
